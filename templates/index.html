<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Headly Pro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Headly Pro</h1>
    <p class="subtitle">Advanced Website Analyzer</p>

    <div class="search-box">
        <input type="text" id="url" placeholder="https://example.com">
        <button onclick="analyze()">Analyze</button>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden">
        <div class="loader"></div>
        <p>Analyzing website...</p>
    </div>

    <!-- Results -->
    <div id="results" class="hidden">

        <div class="grid">

            <div class="card center">
                <h3>SEO Score</h3>
                <p id="seoScore" class="big"></p>
                <div class="progress">
                    <div id="progressBar"></div>
                </div>
            </div>

            <div class="card">
                <h3>Meta Title</h3>
                <p id="metaTitle"></p>
            </div>

            <div class="card">
                <h3>Meta Description</h3>
                <p id="metaDesc"></p>
            </div>

            <div class="card">
                <h3>Headings</h3>
                <p id="headings"></p>
            </div>

            <div class="card">
                <h3>Links</h3>
                <p id="links"></p>
            </div>

            <div class="card">
                <h3>Data</h3>
                <p id="data"></p>
            </div>

        </div>

        <!-- Suggestions -->
        <div class="card">
            <h3>SEO Suggestions</h3>
            <ul id="suggestions"></ul>
        </div>

    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
